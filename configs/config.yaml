# Scaffold 应用配置文件
# Viper 格式，支持环境变量覆盖

server:
  host: "0.0.0.0"
  port: 9090
  cache_dir: "./cache"
  debug: false
  read_timeout: 30
  write_timeout: 30

database:
  enable: true
  driver: "sqlite"
  host: "localhost"
  port: 3306
  user: "root"
  password: ""
  db_name: "./data/scaffold.db"
  ssl_mode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  enable: false
  host: "localhost"
  port: 6379
  password: ""
  db: 0

security:
  access_key: "Zhangyi@123456"

log:
  level: "info"
  filename: ""
  max_size: 100
  max_backups: 3
  max_age: 7
  compress: true

template:
  storage_path: "./templates"
  allowed_dirs:
    - "./templates"

app:
  name: "scaffold"
  version: "1.0.0"
